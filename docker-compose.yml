services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    command: uvicorn medical_agent.api.main:app --host 0.0.0.0 --port 8000

volumes:
  qdrant_storage:
  model_cache:
